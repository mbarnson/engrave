name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
      release_upload_url: ${{ steps.create.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true

  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            rust_target: ""
          - platform: ubuntu-22.04
            args: ""
            rust_target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync

      - name: Install LilyPond (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: brew install lilypond

      - name: Install LilyPond (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: sudo apt-get install -y lilypond

      - name: Install LilyPond (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install lilypond -y

      - name: Build engrave CLI binary (PyInstaller)
        run: |
          uv pip install pyinstaller
          uv run pyinstaller --onefile src/engrave/cli.py -n engrave --distpath desktop/src-tauri/resources

      - name: Rename Windows binary for Tauri bundling
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: mv desktop/src-tauri/resources/engrave.exe desktop/src-tauri/resources/engrave

      - name: Make engrave binary executable (Unix)
        if: matrix.platform != 'windows-latest'
        run: chmod +x desktop/src-tauri/resources/engrave

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm install

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Engrave ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: true
          tauriScript: npx tauri
          args: ${{ matrix.args }}

  # Create universal macOS binary by combining both arch builds
  create-macos-universal:
    needs: [create-release, build-tauri]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          gh release download "${{ github.ref_name }}" -D artifacts --pattern "*.dmg" || true
          echo "Downloaded artifacts:"
          ls -la artifacts/

  publish-release:
    needs: [create-release, build-tauri, create-macos-universal]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" --draft=false --prerelease
