<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Engrave</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <h1>Engrave</h1>
      <p class="subtitle">AI-powered music engraving</p>
      <button id="settings-btn" class="icon-btn" title="Settings">⚙</button>
    </header>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
      <div class="modal-content">
        <h2>Account</h2>
        <div id="auth-status-section">
          <p id="auth-status-text" class="status-text"></p>
        </div>
        <div class="modal-actions">
          <button id="sign-in-settings-btn" class="btn primary">Sign in with Claude</button>
          <button id="sign-out-btn" class="btn danger hidden">Sign Out</button>
          <button id="close-settings-btn" class="btn">Close</button>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <main>
      <!-- Step 1: MIDI Upload -->
      <section id="upload-section" class="step">
        <div id="drop-zone" class="drop-zone">
          <div class="drop-zone-content">
            <span class="drop-icon">🎵</span>
            <p>Drop a MIDI file here</p>
            <p class="drop-hint">or click to browse</p>
          </div>
          <input type="file" id="midi-file-input" accept=".mid,.midi" class="hidden" />
        </div>
      </section>

      <!-- Step 2: Track Editor -->
      <section id="tracks-section" class="step hidden">
        <div class="section-header">
          <h2>Tracks</h2>
          <span id="midi-filename" class="filename"></span>
          <button id="change-file-btn" class="btn small">Change File</button>
        </div>

        <div class="preset-row">
          <label for="preset-select">Preset:</label>
          <select id="preset-select">
            <option value="custom">Custom</option>
            <option value="big-band">Big Band</option>
            <option value="small-combo">Small Combo</option>
            <option value="string-quartet">String Quartet</option>
          </select>
        </div>

        <div id="tracks-list" class="tracks-list">
          <!-- Populated by JS -->
        </div>

        <div class="hints-row">
          <label for="hints-input">Hints (optional):</label>
          <textarea id="hints-input" rows="2" placeholder="e.g., Swing feel, soli at bar 17, brass shout chorus bar 33"></textarea>
        </div>

        <button id="generate-btn" class="btn primary large">Generate Sheet Music</button>
      </section>

      <!-- Step 3: Progress -->
      <section id="progress-section" class="step hidden">
        <h2>Generating...</h2>
        <div class="progress-bar-container">
          <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
        </div>
        <p id="progress-stage" class="progress-text"></p>
        <p id="progress-detail" class="progress-detail"></p>
      </section>

      <!-- Step 4: Results -->
      <section id="results-section" class="step hidden">
        <div class="section-header">
          <h2>Results</h2>
          <button id="new-job-btn" class="btn small">New Job</button>
        </div>

        <div class="results-layout">
          <!-- PDF Preview -->
          <div class="pdf-panel">
            <div class="pdf-tabs" id="pdf-tabs">
              <!-- Populated by JS -->
            </div>
            <div id="pdf-viewer" class="pdf-viewer">
              <p class="placeholder-text">Select a PDF to preview</p>
            </div>
          </div>

          <!-- File List & Measure Fix -->
          <div class="files-panel">
            <h3>Output Files</h3>
            <div id="file-list" class="file-list">
              <!-- Populated by JS -->
            </div>
            <button id="download-zip-btn" class="btn primary">Download All (ZIP)</button>

            <!-- Measure Fix Panel -->
            <div id="measure-fix-panel" class="measure-fix-panel">
              <h3>Fix a Measure</h3>
              <div class="fix-row">
                <label for="fix-instrument">Instrument:</label>
                <select id="fix-instrument">
                  <!-- Populated by JS after generation -->
                </select>
              </div>
              <div class="fix-row">
                <label for="fix-bar">Bar #:</label>
                <input type="number" id="fix-bar" min="1" value="1" />
              </div>
              <div class="fix-row">
                <label for="fix-hint">What needs fixing?</label>
                <textarea id="fix-hint" rows="2" placeholder="e.g., rhythm should be dotted quarter, eighth, half"></textarea>
              </div>
              <button id="fix-measure-btn" class="btn primary">Fix Measure</button>
              <p id="fix-status" class="status-text"></p>
            </div>
          </div>
        </div>
      </section>

      <!-- Error display -->
      <div id="error-banner" class="error-banner hidden">
        <span id="error-text"></span>
        <button id="dismiss-error" class="icon-btn">✕</button>
      </div>
    </main>

    <!-- Sign-in overlay (first launch) -->
    <div id="sign-in-overlay" class="overlay hidden">
      <div class="overlay-content">
        <h2>Welcome to Engrave</h2>
        <p>Sign in with your Claude account to get started.</p>
        <p class="hint-text">
          Requires a Claude Pro or Max subscription.
        </p>
        <button id="overlay-sign-in-btn" class="btn primary large">Sign in with Claude</button>
        <p id="overlay-status" class="status-text"></p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
