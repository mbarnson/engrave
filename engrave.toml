# Engrave runtime configuration
# API keys go in .env (gitignored), not here.

[providers.lm_studio]
api_base = "http://localhost:1234/v1"

[providers.vllm_mlx]
api_base = "http://localhost:8000/v1"

[providers.runpod]
# api_base = "https://api.runpod.ai/v2/YOUR-ENDPOINT-ID/openai/v1"

[roles.compile_fixer]
model = "claude_pipe/haiku"
max_tokens = 4096
tags = ["code"]

[roles.generator]
model = "claude_pipe/haiku"
max_tokens = 8192
tags = ["code", "lilypond"]

[roles.describer]
model = "anthropic/claude-opus-4-6"
max_tokens = 2048
tags = ["audio", "description"]

[lilypond]
min_version = "2.24"
compile_timeout = 60
max_fix_attempts = 5
context_lines = 20

[pipeline]
max_concurrent_groups = 8

[corpus]
embedding_model = "nomic-embed-text"
db_path = "data/corpus_db"
collection_name = "lilypond_phrases"
