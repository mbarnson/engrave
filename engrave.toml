# Engrave runtime configuration
# API keys go in .env (gitignored), not here.

[providers.lm_studio]
api_base = "http://localhost:1234/v1"

[providers.vllm_mlx]
api_base = "http://localhost:8000/v1"

[providers.runpod]
# api_base = "https://api.runpod.ai/v2/YOUR-ENDPOINT-ID/openai/v1"

[providers.agent_sdk]
# Desktop app authenticates via OAuth (Sign in with Claude).
# OAuth token is passed via ANTHROPIC_AUTH_TOKEN env var at runtime.
# Legacy API key fallback: ENGRAVE_PROVIDERS__AGENT_SDK__API_KEY or .env
# api_key = "sk-ant-..."
default_model = "claude-haiku-4-5-20251001"

[roles.compile_fixer]
model = "hosted_vllm/mlx-community/Qwen3-Coder-30B-A3B-Instruct-4bit-dwq-v2"
max_tokens = 4096
tags = ["code"]

[roles.generator]
model = "hosted_vllm/mlx-community/Qwen3-Coder-30B-A3B-Instruct-4bit-dwq-v2"
max_tokens = 8192
tags = ["code", "lilypond"]

[roles.describer]
model = "anthropic/claude-opus-4-6"
max_tokens = 2048
tags = ["audio", "description"]

[lilypond]
min_version = "2.24"
compile_timeout = 60
max_fix_attempts = 5
context_lines = 20

[pipeline]
max_concurrent_groups = 8

[corpus]
embedding_model = "nomic-embed-text"
db_path = "data/corpus_db"
collection_name = "lilypond_phrases"
