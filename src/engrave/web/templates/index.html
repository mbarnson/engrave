<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Engrave</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 600px;
            margin: 2em auto;
            padding: 0 1em;
            color: #1a1a1a;
            line-height: 1.6;
        }
        h1 { margin-bottom: 0.2em; }
        .subtitle {
            color: #555;
            margin-top: 0;
            margin-bottom: 1.5em;
        }
        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 2em;
            text-align: center;
            margin-bottom: 1em;
            transition: border-color 0.2s;
        }
        .upload-area:hover { border-color: #2563eb; }
        textarea {
            width: 100%;
            height: 80px;
            margin: 0.5em 0 1em;
            padding: 0.5em;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.95em;
            resize: vertical;
            box-sizing: border-box;
        }
        button[type="submit"] {
            padding: 0.6em 2em;
            font-size: 1.1em;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button[type="submit"]:hover { background: #1d4ed8; }
        #status { margin-top: 1.5em; }
        #status p { font-size: 1.05em; }
    </style>
</head>
<body>
    <h1>Engrave</h1>
    <p class="subtitle">Upload a MIDI file or audio recording to generate publication-quality sheet music.</p>

    <form hx-post="/engrave" hx-target="#status" hx-swap="outerHTML"
          hx-encoding="multipart/form-data">
        <div class="upload-area">
            <input type="file" name="file"
                   accept=".mid,.midi,.wav,.mp3,.flac,.aiff" required>
        </div>
        <label for="hints"><strong>Hints</strong></label>
        <textarea id="hints" name="hints"
                  placeholder="Optional hints (e.g., Big band, swing feel, soli at bar 17)"></textarea>
        <button type="submit">Engrave</button>
    </form>

    <div id="status"></div>
</body>
</html>
